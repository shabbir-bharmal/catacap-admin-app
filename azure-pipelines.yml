trigger:
  branches:
    include:
      - qa
      - prod

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self
  clean: true
  fetchDepth: 1

# Node version
- task: NodeTool@0
  inputs:
    versionSpec: '20.16.0'
  displayName: 'Install Node.js'

# Install pnpm globally
- script: |
    npm install -g pnpm
  displayName: 'Install pnpm'

# Apply environment file based on branch
- script: |
    echo "Branch: $(Build.SourceBranchName)"
      if [ "$(Build.SourceBranchName)" = "prod" ]; then
        echo "Deploying on $(Build.SourceBranchName) environment"
        cp .env.prod .env
      elif [ "$(Build.SourceBranchName)" = "qa" ]; then
        echo "Deploying on $(Build.SourceBranchName) environment"
        cp .env.qa .env
      else
        echo "Using default .env"
    fi
    echo "------------------"
    echo "Contents of .env:"
    echo "------------------"
    cat .env
  displayName: 'Apply .env file based on branch'

# Install dependencies using pnpm (deterministic)
- script: |
    pnpm install --frozen-lockfile
  displayName: 'Install Dependencies (pnpm)'

# Build
- script: |
    export NODE_ENV=development
    pnpm build
  displayName: 'Build Application'

  # Copy web.config into dist
- script: |
    echo "Copying web.config into dist folder"
    cp web.config dist/
  displayName: 'Copy web.config to dist'

# Archive build output
- task: ArchiveFiles@2
  inputs:
    rootFolderOrFile: 'dist'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/react-admin-app.zip'
    replaceExistingArchive: true
  displayName: 'Archive React dist folder'

# Publish pipeline artifact
- task: PublishPipelineArtifact@1
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)/react-admin-app.zip'
    artifact: 'react-drop'
  displayName: 'Publish dist artifact'